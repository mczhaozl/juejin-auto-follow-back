name: 每日收藏大号文章

on:
  schedule:
    # 每天早上 7:50 北京时间 = 前一天 23:50 UTC
    - cron: '50 23 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行每日收藏脚本
        run: python scripts/daily_collect_main_articles.py
        env:
          PYTHONUNBUFFERED: '1'
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
          JUEJIN_COOKIES_ACCOUNT2: ${{ secrets.JUEJIN_COOKIES_ACCOUNT2 }}
          JUEJIN_COOKIES_ACCOUNT3: ${{ secrets.JUEJIN_COOKIES_ACCOUNT3 }}
          JUEJIN_COOKIES_ACCOUNT4: ${{ secrets.JUEJIN_COOKIES_ACCOUNT4 }}
          JUEJIN_COOKIES_ACCOUNT5: ${{ secrets.JUEJIN_COOKIES_ACCOUNT5 }}
          JUEJIN_COOKIES_ACCOUNT2: ${{ secrets.JUEJIN_COOKIES_ACCOUNT2 }}
          JUEJIN_COOKIES_ACCOUNT3: ${{ secrets.JUEJIN_COOKIES_ACCOUNT3 }}
          JUEJIN_COOKIES_ACCOUNT4: ${{ secrets.JUEJIN_COOKIES_ACCOUNT4 }}
          JUEJIN_COOKIES_ACCOUNT5: ${{ secrets.JUEJIN_COOKIES_ACCOUNT5 }}
