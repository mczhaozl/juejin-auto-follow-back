name: 每日发沸点（大号）

on:
  schedule:
    # 北京时间 9:42 (cron +9:27)
    - cron: '15 0 * * *'
    # 北京时间 10:47 (cron +9:27)
    - cron: '20 1 * * *'
    # 北京时间 11:57 (cron +9:27)
    - cron: '30 2 * * *'
    # 北京时间 15:27 (cron +9:27)
    - cron: '0 6 * * *'
    # 北京时间 16:27 (cron +9:27)
    - cron: '0 7 * * *'
    # 北京时间 17:27 (cron +9:27)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行发沸点（按日期时间选诗句）
        run: python scripts/daily_publish_short_msg.py
        env:
          PYTHONUNBUFFERED: '1'
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
