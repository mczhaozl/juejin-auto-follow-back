name: 自动回关掘金粉丝

on:
  schedule:
    # 每小时执行一次
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  follow-back:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 执行回关脚本
        run: python scripts/follow_back.py
        env:
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
          JUEJIN_COOKIES_ACCOUNT2: ${{ secrets.JUEJIN_COOKIES_ACCOUNT2 }}
          JUEJIN_COOKIES_ACCOUNT3: ${{ secrets.JUEJIN_COOKIES_ACCOUNT3 }}
          JUEJIN_COOKIES_ACCOUNT4: ${{ secrets.JUEJIN_COOKIES_ACCOUNT4 }}
          JUEJIN_COOKIES_ACCOUNT5: ${{ secrets.JUEJIN_COOKIES_ACCOUNT5 }}
          JUEJIN_COOKIES_ACCOUNT6: ${{ secrets.JUEJIN_COOKIES_ACCOUNT6 }}
          JUEJIN_COOKIES_ACCOUNT7: ${{ secrets.JUEJIN_COOKIES_ACCOUNT7 }}
          JUEJIN_COOKIES_ACCOUNT8: ${{ secrets.JUEJIN_COOKIES_ACCOUNT8 }}
          JUEJIN_COOKIES_ACCOUNT9: ${{ secrets.JUEJIN_COOKIES_ACCOUNT9 }}

      - name: 提交执行日志
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/ || true
          git commit -m "📝 更新执行日志 $(date '+%Y-%m-%d %H:%M:%S')" || true
          git push || true
