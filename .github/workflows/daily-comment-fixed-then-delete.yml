name: 评论且删除（每日 10:25，3 次）

on:
  schedule:
    # 每天 10:25 北京时间 = 02:25 UTC
    - cron: '25 2 * * *'
  workflow_dispatch:

jobs:
  comment-then-delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行固定评论后删除（3 次，仅用 Cookie）
        run: python scripts/daily_comment_fixed_then_delete.py
        env:
          PYTHONUNBUFFERED: '1'
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
