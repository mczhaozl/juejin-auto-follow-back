name: AI编写并上传文章（大号）

on:
  schedule:
    # 每隔 1 小时运行一次（整点 UTC = 8:00/9:00/… 北京时间），每次上传 1 篇
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  upload-databae:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 执行上传（当日 databae/MMDD，本次只上传 1 篇）
        run: python scripts/daily_upload_databae.py
        env:
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
          UPLOAD_LIMIT_PER_RUN: '1'
