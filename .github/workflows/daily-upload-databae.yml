name: AI编写并上传文章（大号）

on:
  schedule:
    # 北京时间 8:30
    - cron: '13 23 * * *'
    # 北京时间 9:30
    - cron: '32 0 * * *'
    # 北京时间 10:30
    - cron: '27 1 * * *'
    # 北京时间 11:30
    - cron: '16 2 * * *'
    # 北京时间 12:30
    - cron: '3 3 * * *'
    # 北京时间 13:30
    - cron: '23 4 * * *'
    # 北京时间 14:30
    - cron: '37 5 * * *'
    # 北京时间 15:30
    - cron: '29 6 * * *'
    # 北京时间 16:30
    - cron: '12 7 * * *'
    # 北京时间 17:30
    - cron: '13 8 * * *'
  workflow_dispatch:

jobs:
  upload-databae:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 执行上传（当日 databae/MMDD，本次只上传 1 篇）
        run: python scripts/daily_upload_databae.py
        env:
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
          UPLOAD_LIMIT_PER_RUN: '1'
