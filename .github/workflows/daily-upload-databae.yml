name: AI编写并上传文章（大号）

on:
  schedule:
    # 每天 06:35 北京时间 = 22:35 UTC (前一天)
    - cron: '35 22 * * *'
  workflow_dispatch:

jobs:
  upload-databae:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 执行上传（当日 databae/MMDD，每篇间隔 1 分钟）
        run: python scripts/daily_upload_databae.py
        env:
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
